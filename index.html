<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcast Studio — Text-First NLE</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #08080a;
  --bg-1: #101014;
  --bg-2: #18181e;
  --bg-3: #222230;
  --bg-4: #2c2c3a;
  --border: #2a2a38;
  --border-light: #3a3a4a;
  --text-0: #e8e8f0;
  --text-1: #b0b0c0;
  --text-2: #707888;
  --text-3: #505060;
  --accent: #c89b3c;
  --accent-dim: #8a6c2a;
  --accent-glow: rgba(200,155,60,0.15);
  --sp-1: #e0a040;
  --sp-2: #6ea0e0;
  --sp-3: #60c080;
  --sp-4: #d06898;
  --sp-5: #b080e0;
  --sp-6: #e07060;
  --status-ok: #3aba5e;
  --status-stale: #d0a030;
  --status-pending: #606878;
  --status-error: #d04040;
  --status-rendering: #50a0e0;
  --font: 'IBM Plex Sans', -apple-system, sans-serif;
  --mono: 'IBM Plex Mono', 'SF Mono', monospace;
  --radius: 6px;
  --radius-lg: 10px;
  --transition: 150ms ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%; overflow: hidden;
  font-family: var(--font); font-size: 13px;
  color: var(--text-0); background: var(--bg-0);
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

input, textarea, select, button { font-family: inherit; font-size: inherit; }

/* ── APP SHELL ── */
#app {
  display: grid; height: 100vh;
  grid-template-rows: 42px 1fr 56px;
  grid-template-columns: 260px 1fr 300px;
  grid-template-areas:
    "header header header"
    "source sequence inspector"
    "transport transport transport";
}

/* ── HEADER ── */
.header {
  grid-area: header;
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
.header .logo {
  font-family: var(--mono); font-weight: 600; font-size: 13px;
  color: var(--accent); letter-spacing: 0.5px;
  white-space: nowrap;
}
.header .project-name {
  background: transparent; border: 1px solid transparent;
  color: var(--text-0); padding: 4px 8px; border-radius: var(--radius);
  font-weight: 500; font-size: 13px; min-width: 160px;
  transition: border-color var(--transition);
}
.header .project-name:hover { border-color: var(--border); }
.header .project-name:focus { border-color: var(--accent-dim); outline: none; }
.header .sep { width: 1px; height: 20px; background: var(--border); }
.header .stats {
  font-family: var(--mono); font-size: 11px; color: var(--text-2);
}

.header-actions { margin-left: auto; display: flex; gap: 6px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg-2);
  color: var(--text-1); cursor: pointer; font-size: 12px;
  transition: all var(--transition); white-space: nowrap;
}
.btn:hover { background: var(--bg-3); color: var(--text-0); border-color: var(--border-light); }
.btn:active { transform: scale(0.97); }
.btn.primary { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: var(--accent); }
.btn.sm { padding: 3px 7px; font-size: 11px; }
.btn.icon-only { padding: 5px 6px; }
.btn.danger:hover { border-color: var(--status-error); color: var(--status-error); }

/* ── PANELS ── */
.panel { background: var(--bg-1); overflow: hidden; display: flex; flex-direction: column; }
.panel-header {
  padding: 10px 14px; display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  font-weight: 600; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-2);
}
.panel-body { flex: 1; overflow-y: auto; padding: 8px; }

/* ── SOURCE BIN (Left) ── */
.source-bin {
  grid-area: source;
  border-right: 1px solid var(--border);
}
.source-section { margin-bottom: 12px; }
.source-section-title {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px; cursor: pointer; border-radius: var(--radius);
  font-size: 11px; font-weight: 600; color: var(--text-2);
  text-transform: uppercase; letter-spacing: 0.5px;
  user-select: none;
}
.source-section-title:hover { background: var(--bg-2); }
.source-section-title .arrow { font-size: 9px; transition: transform var(--transition); }
.source-section-title .arrow.collapsed { transform: rotate(-90deg); }
.source-section-content { padding: 2px 0; }

.source-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: var(--radius);
  cursor: pointer; transition: background var(--transition);
  font-size: 12px; color: var(--text-1);
}
.source-item:hover { background: var(--bg-2); }
.source-item.active { background: var(--bg-3); color: var(--text-0); }
.source-item .dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

/* ── SEQUENCE (Center) ── */
.sequence {
  grid-area: sequence;
  border-right: 1px solid var(--border);
}
.sequence .panel-header { justify-content: space-between; }
.sequence-actions { display: flex; gap: 4px; }

.turn-list { padding: 6px 10px; }

.turn-card {
  display: flex; flex-direction: column;
  margin-bottom: 4px; border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-2);
  cursor: pointer; transition: all var(--transition);
  position: relative; overflow: hidden;
}
.turn-card:hover { border-color: var(--border-light); }
.turn-card.selected { border-color: var(--accent-dim); box-shadow: 0 0 0 1px var(--accent-dim); }
.turn-card.playing { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

.turn-card-top {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
}
.turn-num {
  font-family: var(--mono); font-size: 10px; color: var(--text-3);
  min-width: 22px;
}
.turn-speaker {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600;
}
.turn-speaker .dot { width: 7px; height: 7px; border-radius: 50%; }
.turn-meta {
  margin-left: auto; display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px; color: var(--text-3);
}
.turn-status {
  width: 7px; height: 7px; border-radius: 50%;
}
.turn-status.ok { background: var(--status-ok); }
.turn-status.stale { background: var(--status-stale); }
.turn-status.pending { background: var(--status-pending); }
.turn-status.error { background: var(--status-error); }
.turn-status.rendering { background: var(--status-rendering); animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.turn-text {
  padding: 0 10px 8px 10px;
  font-size: 12px; line-height: 1.55;
  color: var(--text-1);
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.turn-card.selected .turn-text { -webkit-line-clamp: unset; }

.turn-waveform {
  height: 24px; margin: 0 10px 6px; border-radius: 3px;
  background: var(--bg-3); overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.turn-waveform canvas { width: 100%; height: 100%; }
.turn-waveform.empty { }
.turn-waveform .placeholder {
  font-size: 10px; color: var(--text-3); font-family: var(--mono);
}

/* ── INSPECTOR (Right) ── */
.inspector { grid-area: inspector; }
.inspector .panel-body { padding: 12px; }

.insp-section { margin-bottom: 16px; }
.insp-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-3); margin-bottom: 5px;
}
.insp-field { margin-bottom: 10px; }

.insp-input {
  width: 100%; padding: 7px 9px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg-2);
  color: var(--text-0); font-size: 12px;
  transition: border-color var(--transition);
}
.insp-input:focus { border-color: var(--accent-dim); outline: none; }
.insp-textarea {
  width: 100%; padding: 8px 9px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg-2);
  color: var(--text-0); font-size: 12px; line-height: 1.55;
  resize: vertical; min-height: 60px;
  transition: border-color var(--transition);
}
.insp-textarea:focus { border-color: var(--accent-dim); outline: none; }

.insp-select {
  width: 100%; padding: 7px 9px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg-2);
  color: var(--text-0); font-size: 12px;
  cursor: pointer;
}
.insp-select:focus { border-color: var(--accent-dim); outline: none; }

.insp-row { display: flex; gap: 6px; align-items: center; }
.insp-actions { display: flex; gap: 6px; flex-wrap: wrap; }

.insp-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 200px; color: var(--text-3); font-size: 12px; text-align: center;
  line-height: 1.6;
}

/* ── TRANSPORT BAR ── */
.transport {
  grid-area: transport;
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px;
  background: var(--bg-1);
  border-top: 1px solid var(--border);
}

.transport-controls { display: flex; align-items: center; gap: 4px; }
.transport-btn {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius); border: none; background: transparent;
  color: var(--text-1); cursor: pointer; font-size: 16px;
  transition: all var(--transition);
}
.transport-btn:hover { background: var(--bg-3); color: var(--text-0); }
.transport-btn.play-btn { font-size: 20px; }
.transport-btn.active { color: var(--accent); }

.transport-time {
  font-family: var(--mono); font-size: 12px; color: var(--text-2);
  min-width: 100px;
}

.transport-progress {
  flex: 1; height: 32px; display: flex; align-items: center;
  cursor: pointer; position: relative;
}
.progress-track {
  width: 100%; height: 4px; background: var(--bg-3);
  border-radius: 2px; position: relative; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px; transition: width 100ms linear;
}
.progress-turns {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
}
.progress-turn-seg {
  height: 100%; border-right: 1px solid var(--bg-1);
  opacity: 0.3;
}

.transport-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.render-progress {
  font-family: var(--mono); font-size: 11px; color: var(--text-2);
}

/* ── MODAL / OVERLAY ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; backdrop-filter: blur(4px);
}
.modal {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 24px;
  min-width: 420px; max-width: 600px; max-height: 80vh;
  overflow-y: auto;
}
.modal h2 {
  font-size: 15px; font-weight: 600; margin-bottom: 16px;
  color: var(--text-0);
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* ── TABS ── */
.tabs { display: flex; gap: 2px; }
.tab {
  padding: 5px 10px; border-radius: var(--radius) var(--radius) 0 0;
  font-size: 11px; font-weight: 500; color: var(--text-2);
  cursor: pointer; transition: all var(--transition);
  border: 1px solid transparent; border-bottom: none;
}
.tab:hover { color: var(--text-1); }
.tab.active { background: var(--bg-2); color: var(--text-0); border-color: var(--border); }

/* ── IMPORT AREA ── */
.import-area {
  border: 1px dashed var(--border-light); border-radius: var(--radius);
  padding: 16px; text-align: center; color: var(--text-3);
  font-size: 12px; cursor: pointer; transition: all var(--transition);
  margin: 8px 0;
}
.import-area:hover { border-color: var(--accent-dim); color: var(--text-2); }

/* ── TOAST ── */
.toast-container {
  position: fixed; bottom: 72px; right: 16px;
  z-index: 2000; display: flex; flex-direction: column; gap: 6px;
}
.toast {
  padding: 10px 16px; border-radius: var(--radius);
  background: var(--bg-3); border: 1px solid var(--border);
  color: var(--text-0); font-size: 12px;
  animation: toast-in 200ms ease;
  max-width: 340px;
}
.toast.error { border-color: var(--status-error); }
.toast.success { border-color: var(--status-ok); }
@keyframes toast-in { from { opacity: 0; transform: translateY(10px); } }

/* ── DRAG HANDLE ── */
.drag-handle {
  cursor: grab; padding: 0 2px; color: var(--text-3);
  font-size: 10px; user-select: none;
}
.drag-handle:hover { color: var(--text-2); }

/* ── CONTEXT MENU ── */
.context-menu {
  position: fixed; background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px 0; z-index: 3000;
  min-width: 180px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.context-item {
  padding: 7px 14px; font-size: 12px; color: var(--text-1);
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: background var(--transition);
}
.context-item:hover { background: var(--bg-3); color: var(--text-0); }
.context-item .shortcut { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--text-3); }
.context-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* ── VOICE LIST ── */
.voice-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 3px;
  max-height: 200px; overflow-y: auto;
}
.voice-option {
  padding: 5px 8px; border-radius: 4px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent;
  transition: all var(--transition); color: var(--text-1);
}
.voice-option:hover { background: var(--bg-3); }
.voice-option.selected { border-color: var(--accent-dim); background: var(--accent-glow); color: var(--text-0); }
.voice-option .vg { font-size: 9px; color: var(--text-3); }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <span class="logo">⎔ PODCAST STUDIO</span>
    <div class="sep"></div>
    <input class="project-name" id="projectName" value="Untitled Project" spellcheck="false">
    <div class="sep"></div>
    <span class="stats" id="headerStats">0 turns · 0:00</span>
    <div class="header-actions">
      <button class="btn sm" onclick="showImportScriptModal()">↓ Import Script</button>
      <button class="btn sm" onclick="showSettingsModal()">⚙ Settings</button>
      <button class="btn sm" onclick="saveProject()">💾 Save</button>
      <button class="btn sm" onclick="showProjectsModal()">📂 Projects</button>
    </div>
  </div>

  <!-- Source Bin -->
  <div class="panel source-bin">
    <div class="panel-header">
      Source Bin
      <button class="btn sm" style="margin-left:auto" onclick="addSource()">+ Source</button>
    </div>
    <div class="panel-body" id="sourceBinBody">
      <!-- Speakers -->
      <div class="source-section">
        <div class="source-section-title" onclick="toggleSection(this)">
          <span class="arrow">▾</span> Speakers
          <button class="btn sm" style="margin-left:auto" onclick="event.stopPropagation(); addSpeaker()">+</button>
        </div>
        <div class="source-section-content" id="speakerList"></div>
      </div>
      <!-- Sources -->
      <div class="source-section">
        <div class="source-section-title" onclick="toggleSection(this)">
          <span class="arrow">▾</span> Materials
        </div>
        <div class="source-section-content" id="sourceList"></div>
      </div>
      <!-- Style Prompt -->
      <div class="source-section">
        <div class="source-section-title" onclick="toggleSection(this)">
          <span class="arrow">▾</span> Style Prompt
        </div>
        <div class="source-section-content" style="padding: 4px 6px;">
          <textarea class="insp-textarea" id="globalStylePrompt" rows="4"
            placeholder="e.g. Dramatic podcast of real-world current situation. Speaker1 is the host, calm. Speaker2 is the guest, fast talker, high voice."
            oninput="state.project.globalStylePrompt = this.value; markDirty()"></textarea>
        </div>
      </div>
      <!-- LLM Script Gen -->
      <div class="source-section">
        <div class="source-section-title" onclick="toggleSection(this)">
          <span class="arrow">▾</span> Script Generator
        </div>
        <div class="source-section-content" style="padding: 4px 6px;">
          <textarea class="insp-textarea" id="scriptGenPrompt" rows="3"
            placeholder="Describe what kind of script to generate..."></textarea>
          <div style="display:flex;gap:4px;margin-top:6px">
            <button class="btn sm primary" onclick="generateScript()">Generate Script</button>
            <button class="btn sm" onclick="appendToScript()">Append</button>
          </div>
          <div id="scriptGenStatus" style="font-size:11px;color:var(--text-3);margin-top:4px"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Sequence -->
  <div class="panel sequence">
    <div class="panel-header">
      Sequence
      <div class="sequence-actions">
        <button class="btn sm" onclick="showImportScriptModal()">↓ Import</button>
        <button class="btn sm" onclick="addTurn()">+ Turn</button>
        <button class="btn sm primary" onclick="renderAll()" id="renderAllBtn">▶ Render All</button>
      </div>
    </div>
    <div class="panel-body" id="sequenceBody">
      <div class="turn-list" id="turnList"></div>
    </div>
  </div>

  <!-- Inspector -->
  <div class="panel inspector">
    <div class="panel-header">Inspector</div>
    <div class="panel-body" id="inspectorBody">
      <div class="insp-empty" id="inspEmpty">
        <div style="font-size:24px;margin-bottom:8px;opacity:0.3">⎔</div>
        Select a turn or speaker<br>to view details
      </div>
      <div id="inspContent" style="display:none"></div>
    </div>
  </div>

  <!-- Transport -->
  <div class="transport">
    <div class="transport-controls">
      <button class="transport-btn" onclick="skipPrev()" title="Previous turn">⏮</button>
      <button class="transport-btn play-btn" onclick="togglePlay()" id="playBtn" title="Play/Pause (Space)">▶</button>
      <button class="transport-btn" onclick="skipNext()" title="Next turn">⏭</button>
      <button class="transport-btn" onclick="stopPlayback()" title="Stop">⏹</button>
    </div>
    <span class="transport-time" id="transportTime">0:00 / 0:00</span>
    <div class="transport-progress" id="transportProgress" onclick="seekTransport(event)">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="transport-right">
      <span class="render-progress" id="renderStatus"></span>
      <button class="btn sm" onclick="exportAudio()">↗ Export WAV</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Context menu -->
<div class="context-menu" id="contextMenu" style="display:none"></div>

<script>

const LANGUAGES = [

let state = {
  project: createDefaultProject(),
  selectedTurnId: null,

  selectedSourceId: null,

  currentTime: 0,

  currentAudioSource: null,
  renderQueue: [],

function createDefaultProject() {
  return {
    id: crypto.randomUUID(),
    name: 'Untitled Project',
    createdAt: Date.now(),
    globalStylePrompt: '',
    silenceGapMs: 300,
    ttsModel: 'gemini-2.5-flash-preview-tts',
    language: 'id-ID',
    speakers: {
      'Speaker1': { displayName:'Speaker 1', voiceId:'Charon', defaultStyle:'', colorIdx:0 },
      'Speaker2': { displayName:'Speaker 2', voiceId:'Zephyr', defaultStyle:'', colorIdx:1 },
    },
    sources: {},
    turns: [],
    // API keys stored separately
  };
}

function newTurnId() { return 't_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function newSourceId() { return 's_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ════════════════════════════════════════════════
// INDEXEDDB
// ════════════════════════════════════════════════
const DB_NAME = 'PodcastStudio';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('projects')) d.createObjectStore('projects', {keyPath:'id'});
      if (!d.objectStoreNames.contains('audio')) d.createObjectStore('audio');
      if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings');
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbPut(store, val, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const s = tx.objectStore(store);
    const r = key ? s.put(val, key) : s.put(val);
    r.onsuccess = () => resolve();
    r.onerror = () => reject(r.error);
  });
}

function dbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const r = tx.objectStore(store).get(key);
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  });
}

function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const r = tx.objectStore(store).getAll();
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  });
}

function dbDelete(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const r = tx.objectStore(store).delete(key);
    r.onsuccess = () => resolve();
    r.onerror = () => reject(r.error);
  });
}

// Audio blobs stored separately: key = projectId + ':' + turnId
function audioKey(turnId) { return state.project.id + ':' + turnId; }

async function saveAudioBlob(turnId, blob) {
  await dbPut('audio', blob, audioKey(turnId));
}

async function loadAudioBlob(turnId) {
  return await dbGet('audio', audioKey(turnId));
}

// ════════════════════════════════════════════════
// SETTINGS (API Keys etc)
// ════════════════════════════════════════════════
let settings = { geminiApiKey: '', anthropicApiKey: '', llmProvider: 'google' };

async function loadSettings() {
  const s = await dbGet('settings', 'global');
  if (s) {
    settings = { ...settings, ...s };
    // Migrate old key names
    if (s.ttsApiKey && !settings.geminiApiKey) settings.geminiApiKey = s.ttsApiKey;
    if (s.llmApiKey && !settings.geminiApiKey) settings.geminiApiKey = s.llmApiKey;
  }
}
async function saveSettings() {
  await dbPut('settings', { ...settings, id: 'global' }, 'global');
}

// ════════════════════════════════════════════════
// PROJECT SAVE / LOAD
// ════════════════════════════════════════════════
async function saveProject() {
  state.project.name = document.getElementById('projectName').value;
  // Strip audio blobs from turns before saving (stored separately)
  const proj = JSON.parse(JSON.stringify(state.project));
  proj.turns.forEach(t => delete t._audioBlob);
  await dbPut('projects', proj);
  state.dirty = false;
  toast('Project saved', 'success');
}

async function loadProject(id) {
  const proj = await dbGet('projects', id);
  if (!proj) return;
  state.project = proj;
  // Migrate old model names
  if (state.project.ttsModel && !state.project.ttsModel.includes('preview')) {
    state.project.ttsModel = state.project.ttsModel.replace('gemini-2.5-flash-tts', 'gemini-2.5-flash-preview-tts')
      .replace('gemini-2.5-pro-tts', 'gemini-2.5-pro-preview-tts');
  }
  state.selectedTurnId = null;
  state.selectedSpeakerAlias = null;
  state.inspectorMode = null;
  stopPlayback();
  document.getElementById('projectName').value = proj.name;
  document.getElementById('globalStylePrompt').value = proj.globalStylePrompt || '';
  // Load audio blobs for each turn
  for (const t of state.project.turns) {
    const blob = await loadAudioBlob(t.id);
    if (blob) t._audioBlob = blob;
  }
  renderAll_UI();
  toast('Project loaded');
}

function markDirty() { state.dirty = true; }

// ════════════════════════════════════════════════
// HASH (for staleness detection)
// ════════════════════════════════════════════════
function textHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) - h + str.charCodeAt(i)) | 0; }
  return h;
}

// ════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════
function toast(msg, type = '') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 200); }, 3000);
}

function renderAll_UI() {
  renderSpeakerList();
  renderSourceList();
  renderTurnList();
  renderInspector();
  updateHeaderStats();
  updateTransportTime();
}

function updateHeaderStats() {
  const turns = state.project.turns;
  const totalMs = turns.reduce((s, t) => s + (t.audioDurationMs || 0), 0)
    + Math.max(0, turns.length - 1) * state.project.silenceGapMs;
  document.getElementById('headerStats').textContent =
    `${turns.length} turns · ${formatTime(totalMs)}`;
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2, '0');
}

  el.innerHTML = turns.map((t, i) => {

    const name = sp ? sp.displayName : t.speakerAlias;

    return `<div class="turn-card ${sel ? 'selected' : ''} ${playing ? 'playing' : ''}"
      onclick="selectTurn('${t.id}')"

        <span class="turn-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <span class="turn-speaker">
          <span class="dot" style="background:${color}"></span>
          ${name}
        </span>
        <div class="turn-meta">
          <span>${dur}</span>
          <span class="turn-status ${status}"></span>
        </div>
      </div>
      <div class="turn-text">${escHtml(preview)}</div>
      ${t._audioBlob ? `<div class="turn-waveform" onclick="event.stopPropagation(); playTurn('${t.id}')">
        <canvas id="wf_${t.id}" height="24"></canvas>
      </div>` : `<div class="turn-waveform empty" onclick="event.stopPropagation()">
        <span class="placeholder">${status === 'rendering' ? 'rendering...' : 'no audio'}</span>

function getTurnStatus(t) {
  if (t._isRendering) return 'rendering';
  if (t._error) return 'error';
  if (t._audioBlob) {
    if (t._renderedHash !== textHash(t.text)) return 'stale';
    return 'ok';
  }
  return 'pending';
}

function drawWaveform(turnId, blob) {
  const canvas = document.getElementById('wf_' + turnId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  canvas.width = w * 2; canvas.height = h * 2;
  ctx.scale(2, 2);

  // Decode the audio blob (PCM 16-bit LE, 24kHz, mono)
  const data = new Int16Array(blob);
  const step = Math.max(1, Math.floor(data.length / w));
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  ctx.globalAlpha = 0.6;

  for (let x = 0; x < w; x++) {
    let max = 0;
    const start = x * step;
    for (let j = 0; j < step && start + j < data.length; j++) {
      const v = Math.abs(data[start + j]);
      if (v > max) max = v;
    }
    const barH = (max / 32768) * h;
    ctx.fillRect(x, (h - barH) / 2, 1, Math.max(1, barH));
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Inspector ──
function renderInspector() {
  const empty = document.getElementById('inspEmpty');
  const content = document.getElementById('inspContent');

  if (!state.inspectorMode) {
    empty.style.display = 'flex';
    content.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  content.style.display = 'block';

  if (state.inspectorMode === 'turn') renderTurnInspector();
  else if (state.inspectorMode === 'speaker') renderSpeakerInspector();
  else if (state.inspectorMode === 'source') renderSourceInspector();
}

  const status = getTurnStatus(t);
  const statusLabels = {ok:'Rendered',stale:'Stale (text changed)',pending:'Not rendered',error:'Error',rendering:'Rendering...'};

  const speakerOpts = Object.entries(state.project.speakers)
    .map(([a, s]) => `<option value="${a}" ${a === t.speakerAlias ? 'selected' : ''}>${s.displayName}</option>`)
    .join('');

  document.getElementById('inspContent').innerHTML = `
    <div class="insp-section">
      <div class="insp-label">Turn ${state.project.turns.indexOf(t) + 1}</div>
      <div class="insp-field">
        <div class="insp-label">Speaker</div>
        <select class="insp-select" onchange="updateTurnSpeaker('${t.id}', this.value)">${speakerOpts}</select>
      </div>
      <div class="insp-field">
        <div class="insp-label">Text</div>
        <textarea class="insp-textarea" style="min-height:120px"
          oninput="updateTurnText('${t.id}', this.value)">${escHtml(t.text)}</textarea>
      </div>
      <div class="insp-field">
        <div class="insp-label">Style Override <span style="color:var(--text-3)">(optional)</span></div>
        <input class="insp-input" value="${escHtml(t.styleOverride || '')}"
          placeholder="Leave blank to use speaker default"
          oninput="updateTurnStyle('${t.id}', this.value)">
      </div>
    </div>
    <div class="insp-section">
      <div class="insp-label">Audio</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="turn-status ${status}"></span>
        <span style="font-size:12px;color:var(--text-1)">${statusLabels[status]}</span>
        ${t.audioDurationMs ? `<span style="font-family:var(--mono);font-size:11px;color:var(--text-2);margin-left:auto">${formatTime(t.audioDurationMs)}</span>` : ''}
      </div>
      <div class="insp-actions">
        <button class="btn sm primary" onclick="renderTurn('${t.id}')">▶ Render</button>
        <button class="btn sm" onclick="playTurn('${t.id}')" ${!t._audioBlob ? 'disabled' : ''}>🔊 Play</button>
      </div>
    </div>
    <div class="insp-section">
      <div class="insp-label">Actions</div>

        <button class="btn sm" onclick="splitTurn('${t.id}')">✂ Split</button>
        <button class="btn sm" onclick="duplicateTurn('${t.id}')">⧉ Duplicate</button>

  state.selectedTurnId = id;
  state.selectedSpeakerAlias = null;
  state.selectedSourceId = null;
  state.inspectorMode = 'turn';
  renderTurnList();
  renderSpeakerList();
  renderSourceList();
  renderInspector();
}

function selectSpeaker(alias) {
  state.selectedSpeakerAlias = alias;
  state.selectedTurnId = null;
  state.selectedSourceId = null;
  state.inspectorMode = 'speaker';
  renderTurnList();
  renderSpeakerList();
  renderSourceList();
  renderInspector();
}

function selectSource(id) {
  state.selectedSourceId = id;
  state.selectedTurnId = null;
  state.selectedSpeakerAlias = null;
  state.inspectorMode = 'source';
  renderTurnList();
  renderSpeakerList();
  renderSourceList();
  renderInspector();
}

// ════════════════════════════════════════════════
// TURN OPERATIONS
// ════════════════════════════════════════════════
function addTurn() {
  const speakers = Object.keys(state.project.speakers);
  const lastTurn = state.project.turns[state.project.turns.length - 1];
  const nextSpeaker = lastTurn
    ? speakers[(speakers.indexOf(lastTurn.speakerAlias) + 1) % speakers.length]
    : speakers[0];

  const t = {
    id: newTurnId(),
    speakerAlias: nextSpeaker || 'Speaker1',
    text: '',
    styleOverride: '',
    _renderedHash: null,
    audioDurationMs: 0,
    _audioBlob: null,
    _isRendering: false,
    _error: null,
  };
  state.project.turns.push(t);
  selectTurn(t.id);
  markDirty();
  // Focus the textarea
  setTimeout(() => {
    const ta = document.querySelector('#inspContent textarea');
    if (ta) ta.focus();
  }, 50);
}

function insertTurnAfter(id) {
  const idx = state.project.turns.findIndex(t => t.id === id);
  if (idx < 0) return;
  const prev = state.project.turns[idx];
  const speakers = Object.keys(state.project.speakers);
  const nextSpeaker = speakers[(speakers.indexOf(prev.speakerAlias) + 1) % speakers.length];

  const t = {
    id: newTurnId(), speakerAlias: nextSpeaker, text: '',
    styleOverride: '', _renderedHash: null, audioDurationMs: 0,
    _audioBlob: null, _isRendering: false, _error: null,
  };
  state.project.turns.splice(idx + 1, 0, t);
  selectTurn(t.id);
  markDirty();
}

function duplicateTurn(id) {
  const idx = state.project.turns.findIndex(t => t.id === id);
  if (idx < 0) return;
  const orig = state.project.turns[idx];
  const t = { ...orig, id: newTurnId(), _audioBlob: null, _renderedHash: null, audioDurationMs: 0 };
  state.project.turns.splice(idx + 1, 0, t);
  selectTurn(t.id);
  markDirty();
}

function deleteTurn(id) {
  state.project.turns = state.project.turns.filter(t => t.id !== id);
  if (state.selectedTurnId === id) {
    state.selectedTurnId = null;
    state.inspectorMode = null;
  }
  markDirty();
  renderAll_UI();
}

function splitTurn(id) {
  const idx = state.project.turns.findIndex(t => t.id === id);
  if (idx < 0) return;
  const t = state.project.turns[idx];
  const text = t.text;
  // Split at roughly the midpoint, preferring sentence boundaries
  let mid = Math.floor(text.length / 2);
  const sentEnd = text.lastIndexOf('. ', mid);
  if (sentEnd > text.length * 0.2) mid = sentEnd + 2;

  const t2 = {
    id: newTurnId(), speakerAlias: t.speakerAlias, text: text.slice(mid).trim(),
    styleOverride: t.styleOverride, _renderedHash: null, audioDurationMs: 0,
    _audioBlob: null, _isRendering: false, _error: null,
  };
  t.text = text.slice(0, mid).trim();
  t._renderedHash = null; t._audioBlob = null; t.audioDurationMs = 0;
  state.project.turns.splice(idx + 1, 0, t2);
  markDirty();
  renderAll_UI();
}

function moveTurnUp(id) {
  const idx = state.project.turns.findIndex(t => t.id === id);
  if (idx <= 0) return;

// ════════════════════════════════════════════════
// TTS RENDERING
// ════════════════════════════════════════════════
async function renderTurn(id) {
  if (!settings.geminiApiKey) { showSettingsModal(); toast('Set your Gemini API key first', 'error'); return; }
  const t = state.project.turns.find(x => x.id === id);
  if (!t || !t.text.trim()) { toast('Turn has no text', 'error'); return; }

  t._isRendering = true; t._error = null;
  renderTurnList(); if (state.selectedTurnId === id) renderInspector();

  try {
    const sp = state.project.speakers[t.speakerAlias];
    const stylePrompt = t.styleOverride || sp?.defaultStyle || state.project.globalStylePrompt || '';
    const voiceName = sp?.voiceId || 'Charon';
    const model = state.project.ttsModel || 'gemini-2.5-flash-preview-tts';
    const lang = state.project.language || 'id-ID';

    // Build the text prompt: style instruction + text content
    const contentText = stylePrompt
      ? `${stylePrompt}: ${t.text}`
      : t.text;

    const body = {
      contents: [{ parts: [{ text: contentText }] }],
      generationConfig: {
        responseModalities: ['AUDIO'],
        speechConfig: {
          languageCode: lang,
          voiceConfig: {
            prebuiltVoiceConfig: { voiceName: voiceName }
          }
        }
      }
    };

    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${settings.geminiApiKey}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const inlineData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
    if (!inlineData?.data) throw new Error('No audio data in response');

    const audioBytes = Uint8Array.from(atob(inlineData.data), c => c.charCodeAt(0));

    // Response is raw PCM 16-bit 24kHz — skip WAV header if present
    let pcmData;
    const header = String.fromCharCode(...audioBytes.slice(0, 4));
    if (header === 'RIFF') {
      pcmData = audioBytes.slice(44);
    } else {
      pcmData = audioBytes;
    }

    t._audioBlob = pcmData.buffer;
    t._renderedHash = textHash(t.text);
    t.audioDurationMs = Math.round((pcmData.length / 2) / 24000 * 1000);
    t._isRendering = false;

    await saveAudioBlob(t.id, pcmData.buffer);
    toast(`Turn ${state.project.turns.indexOf(t) + 1} rendered (${formatTime(t.audioDurationMs)})`, 'success');
  } catch (err) {
    t._isRendering = false;
    t._error = err.message;
    toast('Render error: ' + err.message, 'error');
  }

  renderTurnList();
  if (state.selectedTurnId === id) renderInspector();
  updateHeaderStats();
  updateTransportTime();
}

async function renderAll() {
  if (!settings.geminiApiKey) { showSettingsModal(); toast('Set your Gemini API key first', 'error'); return; }

  const toRender = state.project.turns.filter(t => {
    const status = getTurnStatus(t);
    return (status === 'pending' || status === 'stale' || status === 'error') && t.text.trim();
  });

  if (toRender.length === 0) { toast('All turns are already rendered'); return; }

  const btn = document.getElementById('renderAllBtn');
  btn.textContent = '⏸ Cancel';
  btn.onclick = () => { state.renderQueue = []; btn.textContent = '▶ Render All'; btn.onclick = () => renderAll(); };
  state.renderQueue = toRender.map(t => t.id);

  for (let i = 0; i < state.renderQueue.length; i++) {
    const id = state.renderQueue[i];
    if (!state.renderQueue.includes(id)) break; // cancelled
    document.getElementById('renderStatus').textContent =
      `Rendering ${i + 1}/${toRender.length}`;
    await renderTurn(id);
    // Rate limit: small delay between calls
    if (i < state.renderQueue.length - 1) await new Promise(r => setTimeout(r, 500));
  }

  state.renderQueue = [];
  document.getElementById('renderStatus').textContent = '';
  btn.textContent = '▶ Render All';
  btn.onclick = () => renderAll();
}

// ════════════════════════════════════════════════
// AUDIO PLAYBACK
// ════════════════════════════════════════════════
function getAudioCtx() {
  if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
  return state.audioCtx;
}

function playTurn(id) {
  stopPlayback();
  const t = state.project.turns.find(x => x.id === id);
  if (!t || !t._audioBlob) return;

  const ctx = getAudioCtx();
  const pcm = new Int16Array(t._audioBlob);
  const float = new Float32Array(pcm.length);
  for (let i = 0; i < pcm.length; i++) float[i] = pcm[i] / 32768;

  const buf = ctx.createBuffer(1, float.length, 24000);
  buf.getChannelData(0).set(float);

  const source = ctx.createBufferSource();
  source.buffer = buf;
  source.connect(ctx.destination);
  source.start();

  state.isPlaying = true;
  state.playingTurnId = id;
  state.currentAudioSource = source;

  source.onended = () => {
    if (state.playingTurnId === id) {
      state.isPlaying = false;
      state.playingTurnId = null;
      document.getElementById('playBtn').textContent = '▶';
      renderTurnList();
    }
  };

  document.getElementById('playBtn').textContent = '⏸';
  renderTurnList();
}

async function togglePlay() {
  if (state.isPlaying) { stopPlayback(); return; }
  await playAll();
}

async function playAll(startIdx = 0) {
  stopPlayback();
  const turns = state.project.turns;
  if (turns.length === 0) return;

  state.isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸';

  const ctx = getAudioCtx();
  const silenceSamples = Math.round((state.project.silenceGapMs / 1000) * 24000);

  for (let i = startIdx; i < turns.length; i++) {
    if (!state.isPlaying) break;
    const t = turns[i];
    if (!t._audioBlob) continue;

    state.playingTurnId = t.id;
    renderTurnList();
    updatePlaybackProgress(i);

    // Scroll to playing turn
    const el = document.querySelector(`[data-turn-id="${t.id}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    const pcm = new Int16Array(t._audioBlob);
    const float = new Float32Array(pcm.length);
    for (let j = 0; j < pcm.length; j++) float[j] = pcm[j] / 32768;

    const buf = ctx.createBuffer(1, float.length, 24000);
    buf.getChannelData(0).set(float);

    await new Promise(resolve => {
      const source = ctx.createBufferSource();
      source.buffer = buf;
      source.connect(ctx.destination);
      state.currentAudioSource = source;
      source.onended = resolve;
      source.start();
    });

    if (!state.isPlaying) break;

    // Silence gap
    if (i < turns.length - 1 && silenceSamples > 0) {
      await new Promise(r => setTimeout(r, state.project.silenceGapMs));
    }
  }

  state.isPlaying = false;
  state.playingTurnId = null;
  document.getElementById('playBtn').textContent = '▶';
  renderTurnList();
}

function stopPlayback() {
  state.isPlaying = false;
  if (state.currentAudioSource) {
    try { state.currentAudioSource.stop(); } catch (e) {}
    state.currentAudioSource = null;
  }
  state.playingTurnId = null;
  document.getElementById('playBtn').textContent = '▶';
  renderTurnList();
}

function skipPrev() {
  const idx = state.project.turns.findIndex(t => t.id === state.playingTurnId);
  const newIdx = Math.max(0, (idx > 0 ? idx - 1 : 0));
  if (state.isPlaying) { stopPlayback(); playAll(newIdx); }
  else { selectTurn(state.project.turns[newIdx]?.id); }
}

function skipNext() {
  const idx = state.project.turns.findIndex(t => t.id === state.playingTurnId);
  const newIdx = Math.min(state.project.turns.length - 1, idx + 1);
  if (state.isPlaying) { stopPlayback(); playAll(newIdx); }
  else {
    const nextId = state.project.turns[newIdx]?.id;
    if (nextId) selectTurn(nextId);
  }
}

function updatePlaybackProgress(turnIdx) {
  const turns = state.project.turns;
  let elapsed = 0;
  for (let i = 0; i < turnIdx; i++) {
    elapsed += (turns[i].audioDurationMs || 0) + state.project.silenceGapMs;
  }
  const total = turns.reduce((s, t) => s + (t.audioDurationMs || 0), 0)
    + Math.max(0, turns.length - 1) * state.project.silenceGapMs;
  const pct = total > 0 ? (elapsed / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('transportTime').textContent =
    `${formatTime(elapsed)} / ${formatTime(total)}`;
}

function updateTransportTime() {
  const turns = state.project.turns;
  const total = turns.reduce((s, t) => s + (t.audioDurationMs || 0), 0)
    + Math.max(0, turns.length - 1) * state.project.silenceGapMs;
  document.getElementById('transportTime').textContent = `0:00 / ${formatTime(total)}`;
}

function seekTransport(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const turns = state.project.turns;
  const total = turns.reduce((s, t) => s + (t.audioDurationMs || 0), 0)
    + Math.max(0, turns.length - 1) * state.project.silenceGapMs;
  const targetMs = pct * total;
  let elapsed = 0;
  for (let i = 0; i < turns.length; i++) {
    const dur = (turns[i].audioDurationMs || 0) + state.project.silenceGapMs;
    if (elapsed + dur >= targetMs) {
      if (state.isPlaying) { stopPlayback(); playAll(i); }
      else selectTurn(turns[i].id);
      return;
    }
    elapsed += dur;
  }
}

// ════════════════════════════════════════════════
// EXPORT
// ════════════════════════════════════════════════
function exportAudio() {
  const turns = state.project.turns.filter(t => t._audioBlob);
  if (turns.length === 0) { toast('No rendered audio to export', 'error'); return; }

  const silenceSamples = Math.round((state.project.silenceGapMs / 1000) * 24000);
  const silence = new Int16Array(silenceSamples);

  // Calculate total size
  let totalSamples = 0;
  turns.forEach((t, i) => {
    totalSamples += new Int16Array(t._audioBlob).length;
    if (i < turns.length - 1) totalSamples += silenceSamples;
  });

  const combined = new Int16Array(totalSamples);
  let offset = 0;
  turns.forEach((t, i) => {
    const pcm = new Int16Array(t._audioBlob);
    combined.set(pcm, offset);
    offset += pcm.length;
    if (i < turns.length - 1) {
      combined.set(silence, offset);
      offset += silenceSamples;
    }
  });

  // Create WAV
  const wavHeader = createWavHeader(combined.length * 2, 24000, 1, 16);
  const wavBlob = new Blob([wavHeader, combined.buffer], { type: 'audio/wav' });
  const url = URL.createObjectURL(wavBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (state.project.name || 'podcast') + '.wav';
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported ' + formatTime(totalSamples / 24000 * 1000) + ' of audio', 'success');
}

function createWavHeader(dataSize, sampleRate, channels, bitsPerSample) {
  const header = new ArrayBuffer(44);
  const v = new DataView(header);
  const writeStr = (off, str) => { for (let i = 0; i < str.length; i++) v.setUint8(off + i, str.charCodeAt(i)); };
  writeStr(0, 'RIFF');
  v.setUint32(4, 36 + dataSize, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  v.setUint32(16, 16, true);
  v.setUint16(20, 1, true);
  v.setUint16(22, channels, true);
  v.setUint32(24, sampleRate, true);
  v.setUint32(28, sampleRate * channels * bitsPerSample / 8, true);
  v.setUint16(32, channels * bitsPerSample / 8, true);
  v.setUint16(34, bitsPerSample, true);
  writeStr(36, 'data');
  v.setUint32(40, dataSize, true);
  return header;
}

// ════════════════════════════════════════════════
// IMPORT SCRIPT
// ════════════════════════════════════════════════
function showImportScriptModal() {
  showModal(`
    <h2>Import Script</h2>
    <p style="font-size:12px;color:var(--text-2);margin-bottom:12px">
      Paste a script with speaker tags. Format: <code style="color:var(--accent)">Speaker Name:</code> at the start of a line begins a new turn.
      Multi-line turns are supported — continuation lines (without a speaker tag) are appended to the current turn.
    </p>
    <textarea class="insp-textarea" id="importScriptText" rows="14" style="min-height:200px;font-size:11px"
      placeholder="Speaker 1: First line of dialogue here...&#10;&#10;Speaker 2: Response here...&#10;This continues the same turn."
      oninput="previewImport()"></textarea>
    <div id="importPreview" style="margin-top:8px;font-size:11px;color:var(--text-2)"></div>
    <div style="margin-top:8px">
      <label style="font-size:11px;color:var(--text-2);display:flex;align-items:center;gap:5px">
        <input type="checkbox" id="importClearExisting" checked> Replace existing turns
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="hideModal()">Cancel</button>
      <button class="btn primary" onclick="doImportScript()">Import</button>
    </div>
  `);
}

// Normalize pasted text: strip markdown bold, normalize speaker lines
function normalizeScriptText(text) {
  // Strip markdown bold markers: **Speaker 1:** → Speaker 1:
  // Also handles *Speaker 1:* and __Speaker 1:__
  text = text.replace(/\*\*(.+?)\*\*/g, '$1');
  text = text.replace(/__(.+?)__/g, '$1');
  // Don't strip single * — could be emphasis inside text
  return text;
}

// Smart speaker detection: finds short repeated prefixes before colons.
// Only universal signal: real speakers appear 2+ times. No language-specific tricks.
function detectSpeakers(text) {
  text = normalizeScriptText(text);
  const lines = text.split('\n');
  const candidates = {};

  for (const line of lines) {
    // Match "Label:" with optional text after, or "Label:" alone on a line
    const m = line.match(/^(.{1,30}?):\s*(.*)/);
    if (m) {
      const label = m[1].trim();
      if (!label) continue;
      const words = label.split(/\s+/);
      if (words.length > 3) continue;
      candidates[label] = (candidates[label] || 0) + 1;
    }
  }

  // Only keep labels that appear 2+ times — the only reliable universal heuristic
  return Object.entries(candidates)
    .filter(([_, count]) => count >= 2)
    .map(([label]) => label);
}

function parseScript(text, speakerLabels) {
  text = normalizeScriptText(text);
  const lines = text.split('\n');
  const turns = [];
  let currentSpeaker = null;
  let currentText = '';

  // Build a regex that only matches our detected speaker labels
  if (speakerLabels.length === 0) {
    // Fallback: treat everything as one turn by Speaker1
    return [{ speaker: 'Speaker1', text: text.trim() }];
  }

  // Escape regex special chars in labels, sort by length descending to match longest first
  const escaped = speakerLabels
    .sort((a, b) => b.length - a.length)
    .map(l => l.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  // Match "Label:" with optional text — text may be empty (continues on next line)
  const pattern = new RegExp(`^(${escaped.join('|')}):\\s*(.*)`, 'i');

  function flush() {
    if (currentSpeaker && currentText.trim()) {
      turns.push({ speaker: currentSpeaker, text: currentText.trim() });
    }
    currentText = '';
  }

  for (const line of lines) {
    const m = line.match(pattern);
    if (m) {
      flush();
      currentSpeaker = speakerLabels.find(l => l.toLowerCase() === m[1].toLowerCase()) || m[1].trim();
      currentText = m[2] || '';
    } else {
      // Continuation line — append to current turn
      const trimmed = line.trim();
      if (trimmed) {
        currentText += (currentText ? '\n' : '') + trimmed;
      }
    }
  }
  flush();
  return turns;
}

function previewImport() {
  const text = document.getElementById('importScriptText')?.value || '';
  const preview = document.getElementById('importPreview');
  if (!preview) return;
  if (!text.trim()) { preview.innerHTML = ''; return; }

  const speakers = detectSpeakers(text);
  const turns = parseScript(text, speakers);

  const speakerCounts = {};
  turns.forEach(t => { speakerCounts[t.speaker] = (speakerCounts[t.speaker] || 0) + 1; });

  const speakerList = Object.entries(speakerCounts)
    .map(([s, c]) => `<span style="color:var(--accent)">${escHtml(s)}</span> (${c})`)
    .join(', ');

  preview.innerHTML = `Detected: ${turns.length} turns · Speakers: ${speakerList || 'none detected'}`;
}

function doImportScript() {
  const text = document.getElementById('importScriptText').value;
  const clearExisting = document.getElementById('importClearExisting').checked;
  if (!text.trim()) { toast('No text to import', 'error'); return; }

  const speakers = detectSpeakers(text);
  const turns = parseScript(text, speakers);

  if (turns.length === 0) { toast('No turns detected. Check speaker format.', 'error'); return; }

  if (clearExisting) state.project.turns = [];

  // Map detected speaker labels to aliases and create speaker configs as needed
  for (const turn of turns) {
    // Find existing speaker by display name or alias
    let alias = null;
    for (const [a, sp] of Object.entries(state.project.speakers)) {
      if (sp.displayName === turn.speaker || a === turn.speaker.replace(/\s/g, '')) {
        alias = a; break;
      }
    }
    if (!alias) {
      alias = turn.speaker.replace(/\s/g, '');
      const colorIdx = Object.keys(state.project.speakers).length % SPEAKER_COLORS.length;
      state.project.speakers[alias] = {
        displayName: turn.speaker,
        voiceId: VOICES[colorIdx % VOICES.length].id,
        defaultStyle: '', colorIdx,
      };
    }

    state.project.turns.push({
      id: newTurnId(), speakerAlias: alias, text: turn.text,
      styleOverride: '', _renderedHash: null, audioDurationMs: 0,
      _audioBlob: null, _isRendering: false, _error: null,
    });
  }

  hideModal();
  markDirty();
  renderAll_UI();
  toast(`Imported ${turns.length} turns from ${speakers.length} speaker(s)`, 'success');
}

// ════════════════════════════════════════════════
// SCRIPT GENERATION (LLM)
// ════════════════════════════════════════════════
async function generateScript() {
  const activeKey = settings.llmProvider === 'anthropic' ? settings.anthropicApiKey : settings.geminiApiKey;
  if (!activeKey) { showSettingsModal(); toast('Set your API key first', 'error'); return; }
  const prompt = document.getElementById('scriptGenPrompt').value;
  if (!prompt.trim()) { toast('Describe what to generate', 'error'); return; }

  const statusEl = document.getElementById('scriptGenStatus');
  statusEl.textContent = 'Generating...';

  try {
    const speakerDesc = Object.entries(state.project.speakers)
      .map(([a, s]) => `${a} (${s.displayName})`).join(', ');
    const sources = Object.values(state.project.sources)
      .map(s => `[${s.label}]:\n${s.text.slice(0, 3000)}`).join('\n\n');

    const systemPrompt = `You are a podcast script writer. Write a script for a podcast with these speakers: ${speakerDesc}.
Format each line as "SpeakerAlias: dialogue text" (use the alias exactly as given, no spaces).
Write in the language and style specified. Make it natural, conversational, with back-and-forth exchanges.
Do NOT include stage directions or non-dialogue text. Only output the script lines.`;

    const userPrompt = prompt + (sources ? `\n\nSource materials:\n${sources}` : '');

    let result;
    if (settings.llmProvider === 'anthropic') {
      result = await callAnthropic(systemPrompt, userPrompt);
    } else {
      result = await callGemini(systemPrompt, userPrompt);
    }

    // Clear existing and import
    state.project.turns = [];
    // Parse the generated script using the smart parser
    const speakers = detectSpeakers(result);
    // If auto-detect finds nothing, fall back to known speaker aliases
    const speakerLabels = speakers.length > 0 ? speakers : Object.values(state.project.speakers).map(s => s.displayName);
    const parsed = parseScript(result, speakerLabels);

    for (const turn of parsed) {
      // Find matching speaker alias
      let alias = null;
      for (const [a, sp] of Object.entries(state.project.speakers)) {
        if (sp.displayName.toLowerCase() === turn.speaker.toLowerCase()
            || a.toLowerCase() === turn.speaker.replace(/\s/g, '').toLowerCase()) {
          alias = a; break;
        }
      }
      if (!alias) {
        alias = turn.speaker.replace(/\s/g, '');
        const colorIdx = Object.keys(state.project.speakers).length % SPEAKER_COLORS.length;
        state.project.speakers[alias] = {
          displayName: turn.speaker, voiceId: VOICES[colorIdx % VOICES.length].id,
          defaultStyle: '', colorIdx,
        };
      }
      state.project.turns.push({
        id: newTurnId(), speakerAlias: alias, text: turn.text,
        styleOverride: '', _renderedHash: null, audioDurationMs: 0,
        _audioBlob: null, _isRendering: false, _error: null,
      });
    }

    statusEl.textContent = `Generated ${state.project.turns.length} turns`;
    markDirty();
    renderAll_UI();
    toast(`Script generated: ${state.project.turns.length} turns`, 'success');
  } catch (err) {
    statusEl.textContent = 'Error: ' + err.message;
    toast('Generation error: ' + err.message, 'error');
  }
}

async function appendToScript() {
  toast('Append: coming soon — for now, generate replaces', 'error');
}

async function callGemini(systemPrompt, userPrompt) {
  const resp = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${settings.geminiApiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: [{ parts: [{ text: userPrompt }] }],
        generationConfig: { temperature: 1, maxOutputTokens: 8000 },
      }),
    }
  );
  if (!resp.ok) throw new Error(`Gemini API: ${resp.status}`);
  const data = await resp.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function callAnthropic(systemPrompt, userPrompt) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': settings.anthropicApiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 8000, system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }],
    }),
  });
  if (!resp.ok) throw new Error(`Anthropic API: ${resp.status}`);
  const data = await resp.json();
  return data.content?.[0]?.text || '';
}

// ════════════════════════════════════════════════
// VOICE PREVIEW
// ════════════════════════════════════════════════
async function previewVoice(alias) {
  if (!settings.geminiApiKey) { toast('Set Gemini API key first', 'error'); return; }
  const sp = state.project.speakers[alias];
  const model = state.project.ttsModel || 'gemini-2.5-flash-preview-tts';
  const lang = state.project.language || 'en-US';
  const sampleText = 'Hello, this is a voice preview. Testing one, two, three.';

  try {
    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${settings.geminiApiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: sampleText }] }],
          generationConfig: {
            responseModalities: ['AUDIO'],
            speechConfig: {
              languageCode: lang,
              voiceConfig: { prebuiltVoiceConfig: { voiceName: sp.voiceId } }
            }
          }
        }),
      }
    );
    if (!resp.ok) { const e = await resp.json().catch(()=>({})); throw new Error(e.error?.message || 'API error'); }
    const data = await resp.json();
    const inlineData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
    if (!inlineData?.data) throw new Error('No audio data');
    const bytes = Uint8Array.from(atob(inlineData.data), c => c.charCodeAt(0));
    const pcm = bytes.slice(String.fromCharCode(...bytes.slice(0, 4)) === 'RIFF' ? 44 : 0);

    const ctx = getAudioCtx();
    const int16 = new Int16Array(pcm.buffer, pcm.byteOffset, Math.floor(pcm.length / 2));
    const float = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) float[i] = int16[i] / 32768;
    const buf = ctx.createBuffer(1, float.length, 24000);
    buf.getChannelData(0).set(float);
    const source = ctx.createBufferSource();
    source.buffer = buf; source.connect(ctx.destination); source.start();
  } catch (err) {
    toast('Preview failed: ' + err.message, 'error');
  }
}

// ════════════════════════════════════════════════
// MODALS

function showModal(html) {
  let overlay = document.getElementById('modalOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'modalOverlay';
    overlay.className = 'modal-overlay';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
  overlay.style.display = 'flex';
  overlay.onclick = hideModal;
}

function hideModal() {
  const o = document.getElementById('modalOverlay');
  if (o) o.style.display = 'none';
}

function showSettingsModal() {
  const modelOpts = MODELS.map(m =>
    `<option value="${m.id}" ${m.id === state.project.ttsModel ? 'selected' : ''}>${m.label} (${m.id})</option>`
  ).join('');
  const langOpts = LANGUAGES.map(l =>
    `<option value="${l.code}" ${l.code === state.project.language ? 'selected' : ''}>${l.label}</option>`
  ).join('');

  showModal(`
    <h2>Settings</h2>
    <div class="insp-field">
      <div class="insp-label">Gemini API Key <span style="color:var(--accent)">(required — used for TTS + script generation)</span></div>
      <input class="insp-input" type="password" id="settGeminiKey" value="${settings.geminiApiKey}"
        placeholder="Get from aistudio.google.com → API keys">
      <div style="font-size:10px;color:var(--text-3);margin-top:3px">One key for everything: voice rendering and script generation</div>
    </div>
    <div class="insp-field">
      <div class="insp-label">Anthropic API Key <span style="color:var(--text-3)">(optional — for Claude script generation)</span></div>
      <input class="insp-input" type="password" id="settAnthropicKey" value="${settings.anthropicApiKey}"
        placeholder="sk-ant-... (only if using Claude for scripts)">
    </div>
    <div class="insp-field">
      <div class="insp-label">Script Generation Provider</div>
      <select class="insp-select" id="settLlmProvider">
        <option value="google" ${settings.llmProvider === 'google' ? 'selected' : ''}>Google (Gemini) — uses Gemini key above</option>
        <option value="anthropic" ${settings.llmProvider === 'anthropic' ? 'selected' : ''}>Anthropic (Claude) — uses Anthropic key above</option>
      </select>
    </div>
    <div class="insp-field">
      <div class="insp-label">TTS Model</div>
      <select class="insp-select" id="settTtsModel">${modelOpts}</select>
    </div>
    <div class="insp-field">
      <div class="insp-label">Language</div>
      <select class="insp-select" id="settLang">${langOpts}</select>
    </div>
    <div class="insp-field">
      <div class="insp-label">Silence Between Turns (ms)</div>
      <input class="insp-input" type="number" id="settSilence" value="${state.project.silenceGapMs}" min="0" max="5000" step="50">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="hideModal()">Cancel</button>
      <button class="btn primary" onclick="applySettings()">Save</button>
    </div>
  `);
}

async function applySettings() {
  settings.geminiApiKey = document.getElementById('settGeminiKey').value;
  settings.anthropicApiKey = document.getElementById('settAnthropicKey').value;
  settings.llmProvider = document.getElementById('settLlmProvider').value;
  state.project.ttsModel = document.getElementById('settTtsModel').value;
  state.project.language = document.getElementById('settLang').value;
  state.project.silenceGapMs = parseInt(document.getElementById('settSilence').value) || 300;
  await saveSettings();
  hideModal();
  toast('Settings saved', 'success');
}

function showProjectsModal() {
  dbGetAll('projects').then(projects => {
    const list = projects.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)).map(p =>
      `<div class="source-item" style="justify-content:space-between" onclick="loadProject('${p.id}'); hideModal()">
        <span>${escHtml(p.name)}</span>
        <span style="font-size:10px;color:var(--text-3)">${p.turns?.length || 0} turns</span>
      </div>`
    ).join('');

    showModal(`
      <h2>Projects</h2>
      <div style="margin-bottom:12px">
        <button class="btn sm primary" onclick="newProject(); hideModal()">+ New Project</button>
      </div>
      ${list || '<div style="color:var(--text-3);font-size:12px;padding:12px">No saved projects yet.</div>'}
      <div class="modal-actions">
        <button class="btn" onclick="hideModal()">Close</button>
      </div>
    `);
  });
}

function newProject() {
  state.project = createDefaultProject();
  state.selectedTurnId = null;
  state.inspectorMode = null;
  document.getElementById('projectName').value = state.project.name;
  document.getElementById('globalStylePrompt').value = '';
  renderAll_UI();
}

// ════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  // Don't handle if typing in input/textarea
  if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;

  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowUp') { e.preventDefault(); navigateTurn(-1); }
  if (e.code === 'ArrowDown') { e.preventDefault(); navigateTurn(1); }
  if (e.code === 'Enter' && state.selectedTurnId) { e.preventDefault(); playTurn(state.selectedTurnId); }
  if (e.code === 'KeyR' && state.selectedTurnId) { e.preventDefault(); renderTurn(state.selectedTurnId); }
  if (e.code === 'Delete' && state.selectedTurnId) { e.preventDefault(); deleteTurn(state.selectedTurnId); }
  if (e.code === 'KeyS' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); saveProject(); }
  if (e.code === 'Escape') { stopPlayback(); }
});

function navigateTurn(dir) {
  const turns = state.project.turns;
  if (turns.length === 0) return;
  const idx = turns.findIndex(t => t.id === state.selectedTurnId);
  const newIdx = Math.max(0, Math.min(turns.length - 1, idx + dir));
  selectTurn(turns[newIdx].id);
  const el = document.querySelector(`[data-turn-id="${turns[newIdx].id}"]`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
async function init() {
  await openDB();
  await loadSettings();

  // Try load last project
  const projects = await dbGetAll('projects');
  if (projects.length > 0) {
    const last = projects.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))[0];
    await loadProject(last.id);
  } else {
    renderAll_UI();
  }

  // Autosave every 30s
  setInterval(() => { if (state.dirty) saveProject(); }, 30000);
}

init();
